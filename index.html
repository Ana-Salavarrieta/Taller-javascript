<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Taller-JAVAscript</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <div class="container">

        <h1>Simulador de Nómina Laboral</h1>

        <h2>Ingrese sus datos</h2>


        <!-- formulario datos basicos -->
        <form id="datosGenerales">

            <!-- datos personales -->
            <input
                type="text"
                id="nombre"
                placeholder="Nombre completo"
                required
            >

            <input
                type="number"
                id="edad"
                placeholder="Edad"
                required
            >

            <select id="tipoDocumento" required>

                <option value="">
                    Tipo de documento
                </option>

                <option value="CC">
                    Cédula de ciudadanía
                </option>

                <option value="TI">
                    Tarjeta de identidad
                </option>

                <option value="CE">
                    Cédula de extranjería
                </option>

                <option value="PP">
                    Pasaporte
                </option>

                <option value="RC">
                    Registro civil
                </option>

            </select>

            <input
                type="number"
                id="numeroDocumento"
                placeholder="Número de documento"
                required
            >

            <input
                type="submit"
                value="Continuar"
            >

            <hr>

        </form>


        <!-- formulario segundo -->
        <form id="datos-Salariales" class="oculto">

            <h2 id="tituloPaso2">
                Información Salarial
            </h2>

            <div id="contenedorSalarial">

                <input
                    type="number"
                    id="salario"
                    placeholder="Salario básico (COP)"
                    required
                >

                <div id="camposExtras">

                    <input
                        type="number"
                        id="comisiones"
                        placeholder="Comisiones (COP)"
                    >

                    <input
                        type="number"
                        id="horasExtra"
                        placeholder="Total horas extra (COP)"
                    >

                    <select id="riesgo">

                        <option value="0">
                            Nivel de Riesgo (ARL)
                        </option>

                        <option value="0.00522">
                            Riesgo 1
                        </option>

                        <option value="0.01044">
                            Riesgo 2
                        </option>

                        <option value="0.02436">
                            Riesgo 3
                        </option>

                        <option value="0.04350">
                            Riesgo 4
                        </option>

                        <option value="0.06960">
                            Riesgo 5
                        </option>

                    </select>

                </div>

            </div>

            <input type="submit" value="Calcular Nómina">

        </form>


        <!-- resultados -->
        <div id="resultados" class="oculto">

            <div class="resultado-grid">


                <!-- izquierda -->
                <div class="resultado-info">

                    <h3>Resultados</h3>

                    <div id="contenidoResultados"></div>

                    <button onclick="location.reload()">

                        Nuevo Cálculo

                    </button>

                </div>


                <!-- derecha -->
                <div class="resultado-grafica">

                    <div>

                        <div class="circulo">

                            <div class="circulo-centro">

                                <span>
                                    Ingreso neto
                                </span>

                                <strong id="totalCirculo">

                                    $0

                                </strong>

                            </div>

                        </div>


                        <!-- leyenda -->
                        <div class="leyenda">

                            <p>
                                <span class="rojo"></span>
                                Salud
                            </p>

                            <p>
                                <span class="naranja"></span>
                                Pensión
                            </p>

                            <p>
                                <span class="verde"></span>
                                ARL
                            </p>

                            <p>
                                <span class="morado"></span>
                                Retención
                            </p>

                            <p>
                                <span class="azul"></span>
                                Neto
                            </p>

                        </div>

                    </div>

                </div>

            </div>

        </div>

    </div>


    <!-- script -->
    <script src="script.js"></script>

</body>

</html>
