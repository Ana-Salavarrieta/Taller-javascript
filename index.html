<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taller-JAVAscript</title>
    <script src="script.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">

    <h1>Simulador de Nómina Laboral</h1>
    <h2>Ingrese sus datos</h2>

    <!--  formulario bien estructurado -->
    <form id="datosGenerales">

      <!-- datos personales -->
      <input type="text" id="nombre" placeholder="Nombre completo" required>
      <input type="text" id="edad" placeholder="Edad" required>

      <select id="tipoDocumento" required>
        <option value="">Tipo de documento</option>
        <option value="CC">Cédula de ciudadanía</option>
        <option value="TI">Tarjeta de identidad</option>
        <option value="CE">Cédula de extranjería</option>
        <option value="PP">Pasaporte</option>
        <option value="RC">Registro civil</option>
      </select>

      <input type="text" id="numeroDocumento" placeholder="Número de documento" required>
      <input type="submit">Continuar</input>


      <hr>
    </form>

   <!--  formulario sgundo de los calculos -->

    <from id="datos-Salariales">
      <input type="text" id="salario" placeholder="Salario básico" required>

      <input type="text" id="comisiones" placeholder="Comisiones (opcional)">

      <input type="text" id="horasExtra" placeholder="Horas extra (opcional)">

      <select id="riesgo" required>
        <option value="">Nivel de riesgo (ARL)</option>
        <option value="1">Nivel 1</option>
        <option value="2">Nivel 2</option>
        <option value="3">Nivel 3</option>
        <option value="4">Nivel 4</option>
        <option value="5">Nivel 5</option>
      </select>
      <button type="submit">Calcular Nómina</button>

    </form>

    <!-- resultados -->
    <div id="resultados">
      <h3>Resultados</h3>
      <div id="contenidoResultados">
      </div>
</div>
  </div>

  <!-- script -->
  <script src="script.js"></script>
    
</body>
</html>
